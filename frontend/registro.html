<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro - Sensify</title>


<style>

:root{
  --color-principal: #1b0b2e;   /* fondo oscuro */
  --color-secundario: #ff4fd8;  /* rosado */
  --color-acento: #ff8be3;      /* rosado claro */
  --color-texto: #ffffff;       /* blanco */
  --color-card: #1a1a24;
}

body{
margin:0;
font-family:'Poppins',sans-serif;
background: linear-gradient(135deg, var(--color-principal), #0f0f14);
color: var(--color-texto);
padding:20px;
box-sizing:border-box;
}

.contenedor{
min-height:100dvh;
display:flex;
justify-content:center;
align-items:center;
}

/* TARJETA */
.registro{
background: var(--color-card);
padding:40px;
border-radius:16px;
width:100%;
max-width:350px;
text-align:center;
border:1px solid var(--color-principal);
box-shadow:0 0 20px rgba(255,79,216,0.2);
transition:0.3s;
}

.registro:hover{
transform:translateY(-5px);
}

/* LOGO */
.logo{
width:140px;
margin-bottom:10px;
}

/* TITULO */
.registro h2{
margin-bottom:20px;
color: var(--color-acento);
}

/* INPUTS */
.registro input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
background: var(--color-principal);
color: var(--color-texto);
outline:none;
transition:0.2s;
}

.registro input::placeholder{
color:#aaa;
}

.registro input:focus{
box-shadow: 0 0 0 2px var(--color-secundario);
}

/* BOTON */
.registro button{
margin-top:10px;
width:100%;
padding:12px;
border:none;
border-radius:8px;
background: var(--color-secundario);
color: var(--color-texto);
font-weight:bold;
cursor:pointer;
transition:0.3s;
box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.registro button:hover{
background: var(--color-acento);
transform:scale(1.05);
}

/* LINK */
.registro a{
color: var(--color-texto);
text-decoration:none;
}

.registro a:hover{
text-decoration:underline;
opacity:0.8;
}

@media (max-width: 768px){

.contenedor{
align-items:flex-start;
padding-top:40px;
}

.registro{
width:100%;
max-width:400px;
padding:25px;
}

}

.mensaje{
display:none;
margin-top:15px;
padding:12px;
border-radius:8px;
font-size:14px;
font-weight:500;
text-align:center;
transition:0.3s;
}

.registro button:active{
transform:scale(0.97);
}

/* error */
.mensaje.error{
background: rgba(255, 0, 100, 0.15);
color: var(--color-secundario);
}

/* éxito */
.mensaje.exito{
background: rgba(0, 255, 170, 0.15);
color: var(--color-acento);
}

</style>
</head>

<body>

<div class="contenedor">
<div class="registro">

<img src="logo.png" class="logo">

<h2>Crear cuenta</h2>

<input id="nombre" placeholder="Nombre">
<input id="apellido" placeholder="Apellido">
<input id="correo" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña"
onkeypress="if(event.key==='Enter') registrar()">

<button onclick="registrar()">Registrarse</button>
<div id="mensaje" class="mensaje"></div>
<br><br>

<a href="login.html">Ya tengo cuenta</a>

</div>
</div>

<script>

async function registrar(){

let nombre = document.getElementById("nombre").value
let apellido = document.getElementById("apellido").value
let correo = document.getElementById("correo").value
let password = document.getElementById("password").value

if(!nombre || !apellido || !correo || !password){
mostrarMensaje("Completa todos los campos")
return
}

if(!correo.includes("@") || !correo.includes(".")){
mostrarMensaje("Correo inválido")
return
}

if(password.length < 6){
mostrarMensaje("La contraseña debe tener mínimo 6 caracteres")
return
}

let datos = {nombre, apellido, correo, password}

let res = await fetch("/registro",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(datos)
})

let data = await res.json()

if(data.mensaje !== "usuario creado"){
mostrarMensaje("Error al registrar")
return
}

// éxito 💜
mostrarMensaje("Cuenta creada 💜", "exito")

setTimeout(()=>{
window.location = "login.html"
},1200)

document.getElementById("nombre").value = ""
document.getElementById("apellido").value = ""
document.getElementById("correo").value = ""
document.getElementById("password").value = ""

}

// APLICAR COLORES DINÁMICOS
async function aplicarColores(){

let colores = await fetch("/colores").then(r=>r.json())

let root = document.documentElement

root.style.setProperty("--color-principal", colores.principal)
root.style.setProperty("--color-secundario", colores.secundario)
root.style.setProperty("--color-acento", colores.acento)
root.style.setProperty("--color-texto", colores.texto)
root.style.setProperty("--color-card", colores.card)

}

function mostrarMensaje(texto, tipo="error"){

let msg = document.getElementById("mensaje")

msg.innerText = texto
msg.className = "mensaje " + tipo
msg.style.display = "block"

// SOLO si es error
if(tipo === "error"){
  document.getElementById("password").value = ""
  document.getElementById("password").focus()
}

// desaparecer después de 3 segundos
setTimeout(()=>{
  msg.style.display = "none"
},3000)

}

window.onload = function(){
  aplicarColores()
  document.getElementById("nombre").focus()
}

</script>

</body>
</html>
