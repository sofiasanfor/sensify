<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro - Sensify</title>

<style>

:root{
  --color-principal: #1b0b2e;   /* fondo oscuro */
  --color-secundario: #ff4fd8;  /* rosado */
  --color-acento: #ff8be3;      /* rosado claro */
  --color-texto: #ffffff;       /* blanco */
  --color-card: #1a1a24;
}

body{
margin:0;
font-family:'Poppins',sans-serif;
background: linear-gradient(135deg, var(--color-principal), #0f0f14);
color: var(--color-texto);
padding:20px;
box-sizing:border-box;
}

html{
height:100%;
}

.contenedor{
min-height:100dvh;
display:flex;
justify-content:center;
align-items:center;
}

/* TARJETA */
.registro{
background: var(--color-card);
padding:40px;
border-radius:16px;
width:100%;
max-width:350px;
text-align:center;
border:1px solid var(--color-principal);
box-shadow:0 0 20px rgba(255,79,216,0.2);
transition:0.3s;
}

.registro:hover{
transform:translateY(-5px);
}

/* LOGO */
.logo{
width:140px;
margin-bottom:10px;
}

/* TITULO */
.registro h2{
margin-bottom:20px;
background: var(--color-card);
border:1px solid var(--color-principal);
}

/* INPUTS */
.registro input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
background:#2a2a35;
color:white;
outline:none;
}

.registro input::placeholder{
color:#aaa;
}

/* BOTON */
.registro button{
margin-top:10px;
width:100%;
padding:12px;
border:none;
border-radius:8px;
background: var(--color-secundario);
color: var(--color-texto);
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.registro button:hover{
background: var(--color-acento);
transform:scale(1.05);
}

/* LINK */
.registro a{
color:#ff8be3;
text-decoration:none;
}

.registro a:hover{
text-decoration:underline;
}

@media (max-width: 768px){

.contenedor{
align-items:flex-start;
padding-top:40px;
}

.registro{
width:100%;
max-width:400px;
padding:25px;
}

}

</style>
</head>

<body>

<div class="contenedor">
<div class="registro">

<img src="logo.png" class="logo">

<h2>Crear cuenta</h2>

<input id="nombre" placeholder="Nombre">
<input id="apellido" placeholder="Apellido">
<input id="correo" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">

<button onclick="registrar()">Registrarse</button>

<br><br>

<a href="login.html">Ya tengo cuenta</a>

</div>
</div>

<script>

async function registrar(){

let datos = {
nombre:document.getElementById("nombre").value,
apellido:document.getElementById("apellido").value,
correo:document.getElementById("correo").value,
password:document.getElementById("password").value
}

let res = await fetch("/registro",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(datos)
})

let data = await res.json()

if(data.mensaje !== "usuario creado"){
alert("Error al registrar")
return
}

alert("Cuenta creada 💜")

window.location = "login.html"

}

// APLICAR COLORES DINÁMICOS
async function aplicarColores(){

let colores = await fetch("/colores").then(r=>r.json())

let root = document.documentElement

root.style.setProperty("--color-principal", colores.principal)
root.style.setProperty("--color-secundario", colores.secundario)
root.style.setProperty("--color-acento", colores.acento)
root.style.setProperty("--color-texto", colores.texto)
root.style.setProperty("--color-card", colores.card)

}

// ejecutar
aplicarColores()

</script>

</body>
</html>
