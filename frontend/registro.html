<!DOCTYPE html>
<html>
<head>
<title>Registro - Sensify</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f0f14,#1b0b2e);
color:white;
}

/* TARJETA */
.registro{
background:#1a1a24;
padding:40px;
border-radius:16px;
width:320px;
text-align:center;
border:1px solid #2e2e40;
box-shadow:0 0 20px rgba(255,79,216,0.2);
transition:0.3s;
}

.registro:hover{
transform:translateY(-5px);
}

/* LOGO */
.logo{
width:140px;
margin-bottom:10px;
}

/* TITULO */
.registro h2{
margin-bottom:20px;
color:#ff8be3;
}

/* INPUTS */
.registro input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
background:#2a2a35;
color:white;
outline:none;
}

.registro input::placeholder{
color:#aaa;
}

/* BOTON */
.registro button{
margin-top:10px;
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#ff4fd8;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.registro button:hover{
background:#ff2fcf;
transform:scale(1.05);
}

/* LINK */
.registro a{
color:#ff8be3;
text-decoration:none;
}

.registro a:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div class="registro">

<img src="logo.png" class="logo">

<h2>Crear cuenta</h2>

<input id="nombre" placeholder="Nombre">
<input id="apellido" placeholder="Apellido">
<input id="correo" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">

<button onclick="registrar()">Registrarse</button>

<br><br>

<a href="login.html">Ya tengo cuenta</a>

</div>

<script>

async function registrar(){

let datos = {
nombre:document.getElementById("nombre").value,
apellido:document.getElementById("apellido").value,
correo:document.getElementById("correo").value,
password:document.getElementById("password").value
}

let res = await fetch("/registro",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(datos)
})

let data = await res.json()

if(data.mensaje !== "usuario creado"){
alert("Error al registrar")
return
}

alert("Cuenta creada 💜")

window.location = "login.html"

}

</script>

</body>
</html>
