<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Sensify</title>

<style>
  
:root{
  --color-principal: #1b0b2e;   /* fondo oscuro */
  --color-secundario: #ff4fd8;  /* rosado */
  --color-acento: #ff8be3;      /* rosado claro */
  --color-texto: #ffffff;       /* blanco */
  --color-card: #1a1a24;
}

*{
box-sizing: border-box;
}

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins',sans-serif;
background: linear-gradient(135deg, var(--color-principal), #0f0f14);
color: var(--color-texto);
padding:20px;
box-sizing:border-box;
}

/* TARJETA */
.login{
background: var(--color-card);
padding:40px;
border-radius:16px;
width:320px;
text-align:center;
border:1px solid var(--color-principal);
border:1px solid var(--color-principal);
transition:0.3s;

}

.login:hover{
transform:translateY(-5px);
}

/* LOGO */
.logo{
width:140px;
margin-bottom:10px;
}

/* TITULO */
.login h2{
margin-bottom:20px;
color: var(--color-acento);
}

/* INPUTS */
.login input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
outline:none;
background: var(--color-principal);
color: var(--color-texto);
}

.login input::placeholder{
color:#aaa;
}

/* BOTON */
.login button{
margin-top:10px;
width:100%;
padding:12px;
border:none;
border-radius:8px;
background: var(--color-secundario);
color: var(--color-texto);
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.login button:hover{
background: var(--color-acento);
transform:scale(1.05);
}

/* LINK */
.login a{
color: var(--color-acento);
text-decoration:none;
}

.login a:hover{
text-decoration:underline;
}

/*cel*/
@media (max-width: 768px){

body{
align-items:flex-start;
}

.login{
width:90% !important;
max-width:350px;
margin:auto;
padding:20px;
}
}

</style>
</head>

<body>

<div class="login">

<img src="logo.png" class="logo">

<h2>Iniciar sesión</h2>

<input id="correo" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">

<button onclick="login()">Entrar</button>
<p style="margin-top:10px; text-align:center;">
<a href="recuperar.html" style="color:var(--color-secundario);"></a>
    ¿Olvidaste tu contraseña?
  </a>
</p>

<br><br>

<a href="registro.html">Crear cuenta</a>

</div>

<script>

async function login(){

let correo = document.getElementById("correo").value
let password = document.getElementById("password").value

if(!correo || !password){
alert("Completa todos los campos")
return
}

let datos = {
correo,
password
}

let res = await fetch("/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(datos)
})

let data = await res.json()

if(data.mensaje !== "login correcto"){
alert("Correo o contraseña incorrectos")

document.getElementById("password").value = ""

return
}

// GUARDAR SESION
localStorage.setItem("usuario",JSON.stringify(data))

// REDIRECCION
if(data.rol === "admin"){
window.location="admin.html"
}else{
window.location="index.html"
}
}

// SI YA HAY SESION, REDIRIGIR
window.onload = function(){
let usuario = localStorage.getItem("usuario")
if(usuario){
window.location = "index.html"
}}

// APLICAR COLORES DINÁMICOS
async function aplicarColores(){

let colores = await fetch("/colores").then(r=>r.json())

let root = document.documentElement

root.style.setProperty("--color-principal", colores.principal)
root.style.setProperty("--color-secundario", colores.secundario)
root.style.setProperty("--color-acento", colores.acento)
root.style.setProperty("--color-texto", colores.texto)
root.style.setProperty("--color-card", colores.card)

}

// ejecutar
aplicarColores()

</script>
</body>
</html>
