<!DOCTYPE html>

<body>

<div class="panel">

width:140px;
display:block;
margin:0 auto 20px auto;
">

<div>
<button onclick="mostrarDashboard()">📊 Dashboard</button>
<button onclick="mostrarPedidos()">📦 Pedidos</button>

<script>

// SEGURIDAD
let usuario = JSON.parse(localStorage.getItem("usuario"))
if(!usuario || usuario.rol !== "admin"){
window.location="index.html"
}

function logout(){
localStorage.removeItem("usuario")
window.location="index.html"
}

function toggle(card){
card.classList.toggle("activa")
}

// ================= DASHBOARD =================

async function mostrarDashboard(){

let data = await fetch("/estadisticas").then(r=>r.json())
let productos = await fetch("/productos").then(r=>r.json())
let pedidos = await fetch("/pedidos").then(r=>r.json())

pedidos = pedidos.filter(p => 
  p && (p.productos?.length > 0 || p.producto)
)

let usuarios = await fetch("/usuarios").then(r=>r.json())

let totalStock = productos.reduce((t,p)=>t+p.stock,0)

let productosOrdenados = [...productos].sort((a,b)=>(b.vistas||0)-(a.vistas||0))

let html = `
<h1>Dashboard</h1>

<div class="cards">

<div class="card" onclick="toggle(this)">
<h3>Productos</h3>
<div class="numero">${data.productos}</div>
<div class="lista">${productos.map(p=>p.nombre).join("<br>")}</div>
</div>

<div class="card" onclick="toggle(this)">
<h3>Usuarios</h3>
<div class="numero">${usuarios.length}</div>
<div class="lista">${usuarios.map(u=>u.correo).join("<br>")}</div>
</div>

<div class="card" onclick="toggle(this)">
<h3>Pendientes</h3>
<div class="numero">${pedidos.filter(p=>p.estado==="pendiente").length}</div>
<div class="lista">${pedidos.filter(p=>p.estado==="pendiente").map(p=>p.numero).join("<br>")}</div>
</div>

<div class="card" onclick="toggle(this)">
<h3>Enviados</h3>
<div class="numero">${pedidos.filter(p=>p.estado==="enviado").length}</div>
<div class="lista">${pedidos.filter(p=>p.estado==="enviado").map(p=>p.numero).join("<br>")}</div>
</div>

<div class="card">
<h3>Más vendido</h3>
<div class="numero">${data.masVendido || "—"}</div>
</div>

<div class="card" onclick="toggle(this)">
<h3>Stock crítico</h3>
<div class="numero">${data.stockCritico}</div>
<div class="lista">
${productos
  .filter(p => p.stock < 3)
  .map(p => p.nombre + " (" + p.stock + ")")
  .join("<br>")
}
</div>
</div>

<div class="card">
<h3>Total stock</h3>
<div class="numero">${totalStock}</div>
</div>

<div class="card" onclick="toggle(this)">
<h3>Vistas</h3>
<div class="numero">👁</div>
<div class="lista">
${productosOrdenados.map(p=>p.nombre+" ("+(p.vistas||0)+")").join("<br>")}
</div>
</div>

</div>

${filtroHTML()}
`

document.getElementById("contenido").innerHTML = html
}

// ================= FILTRO =================

return `
<div style="position:fixed;bottom:20px;right:20px;background:#1a1a24;padding:15px;border-radius:10px;">
<input type="date" id="fechaInicio">
<input type="date" id="fechaFin">
<button onclick="filtrarDashboard()" class="btn-guardar">Aplicar</button>
<button onclick="mostrarDashboard()" class="btn-eliminar">Reset</button>
</div>
`
}

function filtrarDashboard(){

let desde = document.getElementById("fechaInicio").value
let hasta = document.getElementById("fechaFin").value

fetch(`/estadisticas?desde=${desde}&hasta=${hasta}`)
.then(r=>r.json())
.then(data=>{

let html = `
<h1>Dashboard</h1>

<div class="cards">

<div class="card" onclick="toggle(this)">
<h3>Productos</h3>
<div class="numero">${data.productos}</div>
<div class="lista">${(data.listaProductos || []).join("<br>")}</div>
</div>

<div class="card" onclick="toggle(this)">
<h3>Usuarios</h3>
<div class="numero">${data.usuarios}</div>
<div class="lista">${(data.listaUsuarios || []).join("<br>")}</div>
</div>

<div class="card" onclick="toggle(this)">
<h3>Pendientes</h3>
<div class="numero">${data.pendientes}</div>
<div class="lista">${(data.listaPendientes || []).join("<br>")}</div>
</div>

<div class="card" onclick="toggle(this)">
<h3>Enviados</h3>
<div class="numero">${data.enviados}</div>
<div class="lista">${(data.listaEnviados || []).join("<br>")}</div>
</div>

<div class="card">
<h3>Más vendido</h3>
<div class="numero">${data.masVendido || "—"}</div>
</div>

<div class="card" onclick="toggle(this)">
<h3>Stock crítico</h3>
<div class="numero">${data.stockCritico}</div>
</div>

</div>

`

}

// ================= PEDIDOS =================

let busquedaGlobal = ""

async function mostrarPedidos(filtro="todos", busqueda=""){

let pedidos = await fetch("/pedidos").then(r=>r.json())

pedidos = pedidos.filter(p => 
p && p._id && (p.productos?.length > 0 || p.producto)
)

// ordenar por fecha
pedidos.sort((a,b)=> new Date(b.fecha) - new Date(a.fecha))

// buscador
busqueda = busqueda || ""

if(busqueda){
pedidos = pedidos.filter(p =>
(p.numero || "").toString().includes(busqueda)
)
}

// filtro
if(filtro!=="todos"){
pedidos = pedidos.filter(p=>p.estado===filtro)
}

let html = `
<h1>Pedidos</h1>

<input id="buscadorPedidos" placeholder="Buscar pedido #0001..."
style="padding:10px; width:250px; border-radius:8px; border:none; margin-bottom:20px;">

<div style="margin-bottom:20px;">
<button onclick="mostrarPedidos('todos')" class="btn-editar">Todos</button>
<button onclick="mostrarPedidos('pendiente')" class="btn-guardar">Pendientes</button>
<button onclick="mostrarPedidos('enviado')" class="btn-eliminar">Enviados</button>
</div>

<div style="
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:15px;
">
`


pedidos.forEach(p=>{

let numero = (p.numero||0).toString().padStart(4,"0")
let fecha = p.fecha ? new Date(p.fecha).toLocaleDateString() : "Sin fecha"

html += `
<div class="pedido-card" data-numero="${numero}" style="
background:#1a1a24;
padding:15px;
border-radius:15px;
border:1px solid #2e2e40;
display:flex;
flex-direction:column;
gap:10px;
">

<h2 style="color:#ff8be3;">#${numero}</h2>
<p style="color:#aaa;">📅 ${fecha}</p>
<p style="color:#aaa;">👤 ${p.usuario || "invitado"}</p>

<div>
${p.productos?.length
  ? p.productos.map(x => `- ${x.nombre} x${x.cantidad}`).join("<br>")
  : `- ${p.producto || ""} x1`
}
</div>

<div style="margin-top:10px;">

<div style="margin-bottom:5px;">
<h3>$${p.total}</h3>
<p style="
font-weight:bold;
color:${p.estado==="pendiente"?"orange":"lime"};
margin:0;
">
${p.estado==="pendiente" ? "PENDIENTE" : "ENVIADO ✔"}
</p>
</div>

<div style="
display:flex;
gap:8px;
flex-wrap:wrap;
">

${p.estado === "pendiente" ? `
<button onclick="enviarPedido('${p._id}')" class="btn-editar">
Marcar como enviado
</button>
` : ""}

<button onclick='verDetalle(${JSON.stringify(p)})' class="btn-guardar">
Ver detalle
</button>

<button onclick="eliminarPedido('${p._id}')" class="btn-eliminar">
Eliminar
</button>

</div>
</div>
</div>
`
})


html += `</div>`

document.getElementById("contenido").innerHTML = html
setTimeout(()=>{

let input = document.getElementById("buscadorPedidos")

if(input){

input.value = busquedaGlobal

input.oninput = function(){

busquedaGlobal = this.value

let tarjetas = document.querySelectorAll(".pedido-card")

tarjetas.forEach(card=>{

let numero = card.dataset.numero

if(numero.includes(busquedaGlobal)){
card.style.display = "block"
}else{
card.style.display = "none"
}

})

}

}

},0)
}

function filtrarPedidos(filtro="todos"){

let texto = document.getElementById("buscadorPedidos").value

mostrarPedidos(filtro, texto)

}

function verDetalle(p){

let numero = (p.numero||0).toString().padStart(4,"0")

let productos = p.productos.map(x=>`
<div style="margin:10px 0;">
<b>${x.nombre}</b> x${x.cantidad} - $${x.precio}
</div>
`).join("")

let modal = document.createElement("div")

modal.innerHTML = `
<div style="
position:fixed;
top:0; left:0;
width:100%; height:100%;
background:rgba(0,0,0,0.7);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
">

<div class="pedido-card" data-numero="${numero}" style="
background:#1a1a24;
padding:15px;
border-radius:15px;
width:400px;
max-width:700px;
margin:auto;
overflow:auto;
">

<h2 style="color:#ff8be3;">Pedido #${numero}</h2>

${productos}

<br>

<button onclick="this.parentElement.parentElement.remove()" class="btn-eliminar">
Cerrar
</button>

}

async function enviarPedido(id){

console.log("ID que se envía:", id)

let res = await fetch("/pedido/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({ estado: "enviado" })
})

let data = await res.text()
console.log("RESPUESTA BACK:", data)

if(res.ok){
alert("Pedido enviado 🚚")
}else{
alert("Error: " + data)
}

mostrarPedidos()
}

async function cambiarEstado(id, estado){

await fetch("/pedido/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({estado})
})

mostrarPedidos()
}

async function eliminarPedido(id){

if(!confirm("¿Eliminar pedido?")) return

console.log("Eliminando ID:", id)

try{

let res = await fetch("http://localhost:3000/pedido/" + id, {
method: "DELETE"
})

let data = await res.json()

console.log("Respuesta:", data)

if(res.ok){
alert("Pedido eliminado ✅")
mostrarPedidos()
}else{
alert("No se pudo eliminar")
}

}catch(e){
console.error(e)
alert("Error real al eliminar")
}

}

async function agregarDescuento(id){

// 🔥 buscamos producto actual
let res = await fetch("/productos")
let productos = await res.json()
let p = productos.find(x => x._id === id)

// 🟥 SI YA TIENE PROMO → ELIMINAR
if(p.promo === true){

await fetch("/productos/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
promo:false,
descuento:0,
precioPromo:0
})
})

alert("Promoción eliminada 💔")
mostrarProductos()
return
}

// 🟢 SI NO TIENE → CREAR
let descuento = prompt("Porcentaje de descuento (ej: 40)")

if(!descuento) return

let precioOriginal = Number(p.precio)
let precioPromo = Math.round(precioOriginal - (precioOriginal * descuento / 100))

await fetch("/productos/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
promo:true,
descuento:Number(descuento),
precioPromo
})
})

alert("Promoción aplicada 🔥")
mostrarProductos()
}

async function guardarEdicion(id){

await fetch("/productos/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
nombre: document.getElementById("nombre").value,
precio: document.getElementById("precio").value,
descripcion: document.getElementById("descripcion").value,
stock: document.getElementById("stock").value,
categoria: document.getElementById("categoria").value
})
})

alert("Producto actualizado 💖")
mostrarProductos()
}

async function eliminar(id){

let confirmar = confirm("¿Eliminar producto?")
if(!confirmar) return

await fetch("/productos/"+id,{
method:"DELETE"
})

alert("Producto eliminado")
mostrarProductos()

}
//===============Banner================

function mostrarBanner(){
contenido.innerHTML = `
<h1>Banner</h1>

<div style="
max-width:500px;
margin:auto;
display:flex;
flex-direction:column;
gap:15px;
background:#1a1a24;
padding:30px;
border-radius:15px;
border:1px solid #2e2e40;
">

<label>Subir imágenes del banner</label>
<input id="bannerImgs" type="file" multiple accept="image/*,.svg">

<button onclick="guardarBanner()" class="btn-guardar">
Guardar banner
</button>

</div>
`
}

async function guardarBanner(){

let files = document.getElementById("bannerImgs").files

if(files.length === 0){
alert("Sube al menos una imagen")
return
}

let formData = new FormData()

Array.from(files).forEach(f=>{
formData.append("imagenes", f)
})

let res = await fetch("/banner",{
method:"POST",
body:formData
})

let text = await res.text()
console.log("RESPUESTA BACK:", text)

if(res.ok){
alert("Banner guardado 💜")
}else{
alert("Error: " + text)
}
}
